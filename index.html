<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokopia Match Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #f2efe4;
    --panel: #fffdf7;
    --ink: #181410;
    --muted: #5f584d;
    --line: #181410;
    --accent: #da6b2c;
    --accent-soft: #c9b6f0;
    --accent-2: #7fb069;
    --accent-3: #fae9a6;
    --shared: #def3d4;
    --shared-soft: #edf8e7;
    --shared-hover: #c6e8b7;
    --flavor: #cfeaff;
    --flavor-hover: #b4ddfb;
    --score: #cbe8be;
    --shadow: 6px 6px 0 #181410;
    --shadow-accent: 6px 6px 0 #da6b2c;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    color: var(--ink);
    font-family: "IBM Plex Mono", monospace;
    background:
      linear-gradient(0deg, rgba(24, 20, 16, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(24, 20, 16, 0.04) 1px, transparent 1px),
      linear-gradient(180deg, #f8f6ee 0%, var(--bg) 100%);
    background-size: 18px 18px, 18px 18px, auto;
  }

  .page {
    width: min(1120px, calc(100% - 28px));
    margin: 22px auto 40px;
  }

  .hero,
  .panel,
  .result-card,
  .empty,
  .summary-card {
    background: var(--panel);
    border: 3px solid var(--line);
    box-shadow: var(--shadow);
  }

  .hero {
    padding: 24px;
    margin-bottom: 18px;
  }

  h1,
  h2,
  h3,
  .pixel {
    font-family: "Press Start 2P", monospace;
    letter-spacing: 0.02em;
  }

  h1 {
    margin: 0 0 14px;
    font-size: clamp(20px, 3vw, 34px);
    line-height: 1.35;
  }

  .intro {
    margin: 0;
    max-width: 760px;
    color: var(--muted);
    line-height: 1.7;
    font-size: 15px;
  }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 18px;
    align-items: start;
  }

  .panel {
    padding: 18px;
  }

  .panel h2 {
    margin: 0 0 10px;
    font-size: 14px;
    line-height: 1.5;
  }

  .panel p {
    margin: 0 0 14px;
    color: var(--muted);
    line-height: 1.6;
    font-size: 14px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field:last-child {
    margin-bottom: 0;
  }

  .panel-section {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 2px solid var(--line);
  }

  .panel-section:first-of-type {
    margin-top: 0;
    padding-top: 0;
    border-top: 0;
  }

  .field label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
  }

  select,
  button {
    width: 100%;
    min-height: 46px;
    padding: 12px 14px;
    border: 3px solid var(--line);
    border-radius: 0;
    background: #fff;
    color: var(--ink);
    font: inherit;
  }

  select:focus,
  button:focus,
  input:focus {
    outline: 3px solid var(--accent-3);
    outline-offset: 2px;
  }

  button {
    cursor: pointer;
    font-weight: 600;
    background: var(--accent);
    color: #fff;
    box-shadow: 3px 3px 0 var(--line);
  }

  button.secondary {
    background: #fff;
    color: var(--ink);
  }

  button.primary {
    background: var(--accent-soft);
    color: var(--ink);
  }

  button.danger {
    background: var(--accent);
    color: #fff;
  }

  .summary-card button {
    width: auto;
    min-width: 0;
  }

  button:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--line);
  }

  button:disabled,
  select:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .specialty-picker {
    position: relative;
  }

  .specialty-input-wrap {
    border: 3px solid var(--line);
    background: #fff;
    min-height: 54px;
    padding: 8px;
  }

  .specialty-input-wrap.has-chips {
    padding-top: 8px;
  }

  .specialty-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .specialty-chips:not(:empty) {
    margin-bottom: 8px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 30px;
    padding: 5px 8px;
    border: 2px solid var(--line);
    background: var(--accent-3);
    font-size: 12px;
  }

  .chip button {
    width: auto;
    min-height: auto;
    min-width: 0;
    padding: 0;
    border: 0;
    background: transparent;
    box-shadow: none;
    color: var(--ink);
    font-size: 14px;
    line-height: 1;
  }

  .chip button:active {
    transform: none;
    box-shadow: none;
  }

  .specialty-search {
    width: 100%;
    min-height: 34px;
    padding: 6px 4px;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--ink);
    font: inherit;
  }

  .specialty-search::placeholder {
    color: var(--muted);
  }

  .specialty-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    z-index: 20;
    max-height: 320px;
    overflow: auto;
    border: 3px solid var(--line);
    background: var(--panel);
    box-shadow: var(--shadow);
  }

  .specialty-suggestion {
    width: 100%;
    min-width: 0;
    text-align: left;
    padding: 12px 12px;
    border: 0;
    border-bottom: 2px solid var(--line);
    background: #fff;
    color: var(--ink);
    box-shadow: none;
  }

  .specialty-suggestion:last-child {
    border-bottom: 0;
  }

  .specialty-suggestion.active,
  .specialty-suggestion:hover,
  .specialty-suggestion:focus {
    background: var(--accent-3);
    outline: 0;
  }

  .specialty-empty {
    padding: 12px;
    font-size: 13px;
    color: var(--muted);
    background: #fff;
  }

  .count,
  .status,
  .muted {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .results-shell {
    display: grid;
    gap: 18px;
  }

  .live-filters {
    display: grid;
    gap: 8px;
  }

  .live-filters[hidden] {
    display: none;
  }

  .live-filter-title {
    margin: 0;
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    line-height: 1.5;
    color: var(--ink);
  }

  .live-filter-subtitle {
    margin: 0;
    font-size: 12px;
    line-height: 1.6;
    color: var(--muted);
  }

  .live-filter-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }

  .toggle-tag {
    width: auto;
    min-width: 0;
    min-height: 30px;
    padding: 6px 10px;
    border: 2px solid var(--line);
    background: #fff;
    color: var(--muted);
    box-shadow: none;
    cursor: pointer;
    transition: background-color 0.12s ease, color 0.12s ease;
  }

  .toggle-tag.active {
    background: var(--shared);
    color: var(--ink);
  }

  .toggle-tag:hover,
  .toggle-tag:focus {
    background: var(--shared-hover);
    color: var(--ink);
    outline: 0;
  }

  .toggle-tag.flavor-filter.active {
    background: var(--flavor);
    color: var(--ink);
  }

  .toggle-tag.flavor-filter:hover,
  .toggle-tag.flavor-filter:focus {
    background: var(--flavor-hover);
    color: var(--ink);
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: end;
  }

  .results-header h2 {
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
  }

  .results-count {
    color: var(--ink);
    font-family: "Press Start 2P", monospace;
    font-size: 14px;
    line-height: 1.5;
    text-align: right;
  }

  .summary {
    display: block;
  }

  .summary-card {
    padding: 16px;
  }

  .summary-card .result-top {
    align-items: center;
    margin-bottom: 0;
  }

  .summary-card .result-top > div:first-child {
    min-width: 0;
    display: flex;
    align-items: center;
  }

  .summary-card h3 {
    margin: 0;
    font-size: 15px;
    line-height: 1.5;
  }

  .name-line .tag-list {
    display: inline-flex;
    align-items: center;
    margin-top: 0;
  }

  .meta-line {
    margin: 10px 0 0;
    font-size: 13px;
    line-height: 1.6;
  }

  .meta-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px;
    align-items: start;
    margin-top: 10px;
  }

  .meta-row .meta-line {
    margin: 0;
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 6px 10px;
    border: 2px solid var(--line);
    background: #fff;
    font-size: 12px;
    line-height: 1.3;
  }

  .tag.shared {
    background: var(--shared);
  }

  .tag.faded {
    border-style: dashed;
    color: var(--muted);
    opacity: 0.78;
  }

  .tag.specialty {
    background: var(--accent-3);
    border-style: solid;
    color: var(--ink);
    opacity: 1;
  }

  .tag.flavor {
    background: var(--flavor);
    border-style: solid;
    color: var(--ink);
    opacity: 1;
  }

  .result-list {
    display: grid;
    gap: 14px;
  }

  .result-card {
    padding: 16px;
  }

  .result-top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: start;
    margin-bottom: 14px;
  }

  .result-name {
    margin: 0;
    font-size: 16px;
    line-height: 1.5;
  }

  .name-line {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }

  .score {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 6px 10px;
    border: 2px solid var(--line);
    background: var(--score);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  .result-group {
    display: grid;
    gap: 12px;
  }

  .result-group + .result-group {
    margin-top: 8px;
  }

  .group-title {
    margin: 0;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink);
  }

  .result-meta {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 14px;
  }

  .result-meta strong {
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
    text-transform: uppercase;
  }

  .empty {
    padding: 18px;
    font-size: 14px;
    line-height: 1.7;
  }

  .status code {
    font-family: inherit;
    font-weight: 600;
  }

  @media (max-width: 920px) {
    .layout,
    .result-meta {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 620px) {
    .page {
      width: min(100% - 18px, 1120px);
      margin: 12px auto 24px;
    }

    .hero,
    .panel,
    .result-card,
    .empty,
    .summary-card {
      box-shadow: 4px 4px 0 var(--line);
    }

    .results-header,
    .result-top,
    .specialty-toolbar {
      flex-direction: column;
      align-items: stretch;
    }
  }
</style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>POKOPIA MATCH FINDER</h1>
      <p class="intro">Choose a starting Pokemon and find the best companions for the same habitat.</p>
    </section>

    <div class="layout">
      <section class="panel">
        <h2>CHOOSE POKEMON</h2>

        <div class="panel-section">
          <div class="count" id="filterCount" style="margin-bottom:8px;">No specialty filter active.</div>
          <div class="specialty-picker">
            <div class="specialty-input-wrap" id="specialtyCombobox">
              <div class="specialty-chips" id="selectedSpecialties"></div>
              <input
                id="specialtySearch"
                class="specialty-search"
                type="text"
                placeholder="Filter by specialty..."
                autocomplete="off"
                aria-label="Search specialties"
              >
            </div>
            <div class="specialty-dropdown" id="specialtyDropdown" hidden></div>
          </div>
        </div>

        <div class="panel-section">
          <div class="field">
            <label for="pokemonSelect">Pokemon</label>
            <select id="pokemonSelect" disabled>
              <option value="">Loading data...</option>
            </select>
          </div>
          <div class="field">
            <label for="matchScope">Compare against</label>
            <select id="matchScope" disabled>
              <option value="all" selected>All Pokemon</option>
              <option value="filtered">Only filtered Pokemon</option>
            </select>
          </div>
          <div class="field">
            <label for="minShared">Minimum shared favorites</label>
            <select id="minShared" disabled></select>
          </div>
          <div class="field">
            <button type="button" class="primary" id="searchBtn" disabled>Find matches</button>
          </div>
          <div class="status" id="loadStatus">Loading <code>dex.json</code>...</div>
        </div>
      </section>

      <section class="results-shell">
        <div class="results-header">
          <h2>MATCH RESULTS</h2>
          <div class="results-count" id="resultsCount">No search yet.</div>
        </div>
        <div id="summary" class="empty">Choose a starting Pokemon, then run the search to find the best habitat matches.</div>
        <div id="liveFilters" class="live-filters" hidden></div>
        <div id="results" class="result-list"></div>
      </section>
    </div>
  </main>

<script>
let DATA = [];
let ALL_SPECIALTIES = [];
let selectedSpecialties = [];
let activeSuggestionIndex = -1;
let specialtyDropdownOpen = false;
let latestSearchState = null;
let activeResultFavoriteFilters = [];
let activeResultFlavorFilter = false;

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

function intersect(a, b) {
  const setB = new Set(b);
  return a.filter((item) => setB.has(item)).sort((x, y) => x.localeCompare(y));
}

function getAllSpecialties(data) {
  return Array.from(new Set(data.flatMap((item) => item.specialties || [])))
    .sort((a, b) => a.localeCompare(b));
}

function getSelectedSpecialties() {
  return selectedSpecialties.slice();
}

function renderTags(items, sharedItems) {
  const sharedSet = new Set(sharedItems || []);
  return '<div class="tag-list">' + items.map((item) => {
    const tagClass = sharedSet.has(item) ? ' shared' : ' faded';
    return '<span class="tag' + tagClass + '">' + escapeHtml(item) + '</span>';
  }).join('') + '</div>';
}

function renderSpecialtyTags(items) {
  return '<div class="tag-list">' + items.map((item) => {
    return '<span class="tag specialty">' + escapeHtml(item) + '</span>';
  }).join('') + '</div>';
}

function renderFlavorTag(flavor) {
  return '<div class="tag-list"><span class="tag flavor">' + escapeHtml(flavor) + '</span></div>';
}

function renderFavoriteFilterTags(items) {
  return items.map((item) => {
    const activeClass = activeResultFavoriteFilters.includes(item) ? ' active' : '';
    return '<button type="button" class="tag toggle-tag' + activeClass + '" data-favorite-filter="' + escapeHtml(item) + '">' + escapeHtml(item) + '</button>';
  }).join('');
}

function renderFlavorFilterTag(flavor) {
  const activeClass = activeResultFlavorFilter ? ' active' : '';
  return '<button type="button" class="tag toggle-tag flavor-filter' + activeClass + '" data-flavor-filter="' + escapeHtml(flavor) + '">' + escapeHtml(flavor) + '</button>';
}

function getPokemonProfile(pokemon) {
  const favorites = Array.isArray(pokemon.favorites) ? pokemon.favorites.slice() : [];
  const flavor = favorites.length ? favorites[favorites.length - 1] : null;
  const interests = favorites.slice(0, -1);

  return {
    ...pokemon,
    interests,
    flavor
  };
}

function renderMinSharedOptions(maxFavorites) {
  const select = document.getElementById('minShared');
  const limit = Math.max(1, maxFavorites);
  let html = '';

  for (let i = 1; i <= limit; i++) {
    const selected = i === Math.min(3, limit) ? ' selected' : '';
    html += '<option value="' + i + '"' + selected + '>' + i + '</option>';
  }

  select.innerHTML = html;
}

function getMatchPool() {
  const scope = document.getElementById('matchScope').value;
  return scope === 'filtered' ? getFilteredPokemon() : DATA;
}

function syncMinSharedOptions() {
  const select = document.getElementById('minShared');
  const searchBtn = document.getElementById('searchBtn');
  const selectedName = document.getElementById('pokemonSelect').value;

  if (!DATA.length || !selectedName) {
    select.innerHTML = '<option value="">Select a Pokemon first</option>';
    select.disabled = true;
    searchBtn.disabled = true;
    return;
  }

  const base = DATA.find((pokemon) => pokemon.name === selectedName);
  if (!base) {
    select.innerHTML = '<option value="">Select a Pokemon first</option>';
    select.disabled = true;
    searchBtn.disabled = true;
    return;
  }

  const baseProfile = getPokemonProfile(base);
  const pool = getMatchPool();
  const maxShared = pool
    .filter((pokemon) => pokemon.name !== base.name)
    .reduce((best, pokemon) => {
      const profile = getPokemonProfile(pokemon);
      const sharedCount = intersect(baseProfile.interests, profile.interests).length;
      return Math.max(best, sharedCount);
    }, 0);

  if (maxShared <= 0) {
    select.innerHTML = '<option value="0">No shared favorites</option>';
    select.value = '0';
    select.disabled = true;
    searchBtn.disabled = true;
    return;
  }

  const previousValue = Number(select.value);
  renderMinSharedOptions(maxShared);
  select.disabled = false;
  searchBtn.disabled = false;

  if (previousValue >= 1 && previousValue <= maxShared) {
    select.value = String(previousValue);
  }
}

function renderSpecialties() {
  ALL_SPECIALTIES = getAllSpecialties(DATA);
  renderSelectedSpecialtyChips();
  renderSpecialtySuggestions();
}

function getAvailableSpecialties(query) {
  const normalizedQuery = query.trim().toLowerCase();
  const matchingPokemon = selectedSpecialties.length === 0
    ? DATA
    : DATA.filter((pokemon) => selectedSpecialties.every((specialty) => pokemon.specialties.includes(specialty)));
  const compatibleSpecialties = Array.from(
    new Set(matchingPokemon.flatMap((pokemon) => pokemon.specialties || []))
  ).sort((a, b) => a.localeCompare(b));

  return compatibleSpecialties
    .filter((specialty) => !selectedSpecialties.includes(specialty))
    .filter((specialty) => specialty.toLowerCase().includes(normalizedQuery));
}

function renderSelectedSpecialtyChips() {
  const chips = document.getElementById('selectedSpecialties');
  const wrap = document.getElementById('specialtyCombobox');

  chips.innerHTML = selectedSpecialties.map((specialty) => {
    return '<span class="chip">' +
      '<span>' + escapeHtml(specialty) + '</span>' +
      '<button type="button" data-remove-specialty="' + escapeHtml(specialty) + '" aria-label="Remove ' + escapeHtml(specialty) + '">x</button>' +
    '</span>';
  }).join('');

  wrap.classList.toggle('has-chips', selectedSpecialties.length > 0);

  chips.querySelectorAll('[data-remove-specialty]').forEach((button) => {
    button.addEventListener('click', () => {
      removeSpecialty(button.getAttribute('data-remove-specialty'));
    });
  });
}

function renderSpecialtySuggestions() {
  const input = document.getElementById('specialtySearch');
  const dropdown = document.getElementById('specialtyDropdown');
  const available = getAvailableSpecialties(input.value);

  if (!specialtyDropdownOpen) {
    dropdown.hidden = true;
    return;
  }

  if (available.length === 0) {
    activeSuggestionIndex = -1;
    dropdown.innerHTML = '<div class="specialty-empty">No compatible specialties found.</div>';
    dropdown.hidden = false;
    return;
  }

  if (activeSuggestionIndex >= available.length) {
    activeSuggestionIndex = 0;
  }

  dropdown.innerHTML = available.map((specialty, index) => {
    const activeClass = index === activeSuggestionIndex ? ' active' : '';
    return '<button type="button" class="specialty-suggestion' + activeClass + '" data-specialty="' + escapeHtml(specialty) + '">' + escapeHtml(specialty) + '</button>';
  }).join('');

  dropdown.hidden = false;

  dropdown.querySelectorAll('[data-specialty]').forEach((button) => {
    button.addEventListener('click', () => {
      addSpecialty(button.getAttribute('data-specialty'));
    });
  });
}

function addSpecialty(specialty) {
  if (!specialty || selectedSpecialties.includes(specialty)) {
    return;
  }

  selectedSpecialties.push(specialty);
  selectedSpecialties.sort((a, b) => a.localeCompare(b));
  const input = document.getElementById('specialtySearch');
  input.value = '';
  activeSuggestionIndex = -1;
  specialtyDropdownOpen = true;
  renderSelectedSpecialtyChips();
  renderSpecialtySuggestions();
  updateFilterCount();
  renderPokemonSelect();
  input.focus();
}

function removeSpecialty(specialty) {
  selectedSpecialties = selectedSpecialties.filter((item) => item !== specialty);
  activeSuggestionIndex = -1;
  specialtyDropdownOpen = true;
  renderSelectedSpecialtyChips();
  renderSpecialtySuggestions();
  updateFilterCount();
  renderPokemonSelect();
}

function setupSpecialtyAutocomplete() {
  const input = document.getElementById('specialtySearch');
  const dropdown = document.getElementById('specialtyDropdown');

  input.addEventListener('focus', () => {
    specialtyDropdownOpen = true;
    renderSpecialtySuggestions();
  });

  input.addEventListener('input', () => {
    specialtyDropdownOpen = true;
    activeSuggestionIndex = -1;
    renderSpecialtySuggestions();
  });

  input.addEventListener('keydown', (event) => {
    const available = getAvailableSpecialties(input.value);

    if (event.key === 'Backspace' && input.value === '' && selectedSpecialties.length) {
      removeSpecialty(selectedSpecialties[selectedSpecialties.length - 1]);
      return;
    }

    if (event.key === 'ArrowDown') {
      event.preventDefault();
      if (!available.length) return;
      activeSuggestionIndex = (activeSuggestionIndex + 1) % available.length;
      renderSpecialtySuggestions();
      return;
    }

    if (event.key === 'ArrowUp') {
      event.preventDefault();
      if (!available.length) return;
      activeSuggestionIndex = activeSuggestionIndex <= 0 ? available.length - 1 : activeSuggestionIndex - 1;
      renderSpecialtySuggestions();
      return;
    }

    if (event.key === 'Enter') {
      if (!available.length) return;
      event.preventDefault();
      const index = activeSuggestionIndex >= 0 ? activeSuggestionIndex : 0;
      addSpecialty(available[index]);
      return;
    }

    if (event.key === 'Escape') {
      specialtyDropdownOpen = false;
      dropdown.hidden = true;
    }
  });

  document.getElementById('specialtyCombobox').addEventListener('click', () => {
    specialtyDropdownOpen = true;
    renderSpecialtySuggestions();
    input.focus();
  });

  document.addEventListener('click', (event) => {
    const combobox = document.getElementById('specialtyCombobox');
    if (!combobox.contains(event.target) && !dropdown.contains(event.target)) {
      specialtyDropdownOpen = false;
      dropdown.hidden = true;
    }
  });
}

function getFilteredPokemon() {
  const selectedSpecialties = getSelectedSpecialties();
  if (selectedSpecialties.length === 0) {
    return DATA.slice().sort((a, b) => a.name.localeCompare(b.name));
  }

  return DATA
    .filter((pokemon) => selectedSpecialties.every((specialty) => pokemon.specialties.includes(specialty)))
    .sort((a, b) => a.name.localeCompare(b.name));
}

function renderPokemonSelect() {
  const select = document.getElementById('pokemonSelect');
  const filtered = getFilteredPokemon();
  const currentValue = select.value;

  let html = '<option value="">-- Select a Pokemon --</option>';
  html += filtered.map((pokemon) => {
    const safeName = escapeHtml(pokemon.name);
    return '<option value="' + safeName + '">' + safeName + '</option>';
  }).join('');

  select.innerHTML = html;
  select.disabled = DATA.length === 0;

  if (filtered.some((pokemon) => pokemon.name === currentValue)) {
    select.value = currentValue;
  }

  if (!select.value && filtered.length === 1) {
    select.value = filtered[0].name;
  }

  document.getElementById('matchScope').disabled = filtered.length === 0;
  syncMinSharedOptions();
}

function updateFilterCount() {
  const selected = getSelectedSpecialties();
  const filtered = getFilteredPokemon();
  const countEl = document.getElementById('filterCount');

  if (selected.length === 0) {
    countEl.textContent = 'No specialty filter active. ' + DATA.length + ' Pokemon available.';
    return;
  }

  countEl.textContent = selected.length + ' specialty filters active. ' + filtered.length + ' Pokemon match this filter.';
}

function renderSummary(base) {
  const summary = document.getElementById('summary');
  summary.className = 'summary';

  summary.innerHTML =
    '<div class="summary-card">' +
      '<div class="result-top">' +
        '<div>' +
          '<div class="name-line">' +
            '<h3 class="result-name">' + escapeHtml(base.name) + '</h3>' +
            renderSpecialtyTags(base.specialties) +
          '</div>' +
        '</div>' +
        '<button type="button" class="danger" id="resetSearchBtn">Reset search</button>' +
      '</div>' +
    '</div>';

  document.getElementById('resetSearchBtn').addEventListener('click', resetSearch);
}

function renderLiveFilters(base) {
  const container = document.getElementById('liveFilters');

  if (!base || !base.interests.length) {
    if (!base || !base.flavor) {
      container.hidden = true;
      container.innerHTML = '';
      return;
    }
  }

  container.hidden = false;
  container.innerHTML =
    '<div class="live-filter-title">FILTER MATCHES</div>' +
    '<div class="live-filter-subtitle">Toggle preferences to narrow the visible results live.</div>' +
    '<div class="live-filter-row">' +
      (base.interests.length ? renderFavoriteFilterTags(base.interests) : '') +
      (base.flavor ? renderFlavorFilterTag(base.flavor) : '') +
    '</div>';

  container.querySelectorAll('[data-favorite-filter]').forEach((button) => {
    button.addEventListener('click', () => {
      const favorite = button.getAttribute('data-favorite-filter');
      if (activeResultFavoriteFilters.includes(favorite)) {
        activeResultFavoriteFilters = activeResultFavoriteFilters.filter((item) => item !== favorite);
      } else {
        activeResultFavoriteFilters = activeResultFavoriteFilters.concat(favorite).sort((a, b) => a.localeCompare(b));
      }
      renderLiveFilters(base);
      renderResultsFromState();
    });
  });

  container.querySelectorAll('[data-flavor-filter]').forEach((button) => {
    button.addEventListener('click', () => {
      activeResultFlavorFilter = !activeResultFlavorFilter;
      renderLiveFilters(base);
      renderResultsFromState();
    });
  });
}

function renderResultsFromState() {
  const results = document.getElementById('results');
  const resultsCount = document.getElementById('resultsCount');

  if (!latestSearchState) {
    results.innerHTML = '';
    resultsCount.textContent = 'No search yet.';
    return;
  }

  const { matches } = latestSearchState;
  const visibleMatches = matches.filter((item) =>
    activeResultFavoriteFilters.every((favorite) => item.sharedFavorites.includes(favorite)) &&
    (!activeResultFlavorFilter || item.other.flavor === latestSearchState.base.flavor)
  );

  resultsCount.textContent = visibleMatches.length + ' ranked habitat matches.';

  if (visibleMatches.length === 0) {
    results.innerHTML = '<div class="empty">No visible match includes all selected favorite filters.</div>';
    return;
  }

  const groupedMatches = visibleMatches.reduce((acc, item) => {
    const key = item.sharedFavorites.length;
    if (!acc[key]) acc[key] = [];
    acc[key].push(item);
    return acc;
  }, {});

  results.innerHTML = Object.keys(groupedMatches)
    .map(Number)
    .sort((a, b) => b - a)
    .map((score) => {
      const items = groupedMatches[score];
      const title = score + ' shared favorites';

      const cards = items.map((item) => {
        return '<article class="result-card">' +
      '<div class="result-top">' +
        '<div>' +
          '<div class="name-line">' +
            '<h3 class="result-name">' + escapeHtml(item.other.name) + '</h3>' +
            renderSpecialtyTags(item.other.specialties) +
          '</div>' +
        '</div>' +
        '<div class="score">' + item.sharedFavorites.length + ' shared favorites</div>' +
      '</div>' +
      '<div class="result-meta">' +
        '<div>' +
          '<strong>Favorites</strong>' +
          renderTags(item.other.interests, item.sharedFavorites) +
          '<div class="meta-line"><strong>Favorite flavor</strong></div>' +
          (item.other.flavor ? renderFlavorTag(item.other.flavor) : '<div class="muted">None</div>') +
        '</div>' +
      '</div>' +
    '</article>';
      }).join('');

      return '<section class="result-group">' +
        '<h3 class="group-title">' + escapeHtml(title) + '</h3>' +
        cards +
      '</section>';
    }).join('');
}

function resetSearch() {
  latestSearchState = null;
  activeResultFavoriteFilters = [];
  activeResultFlavorFilter = false;
  document.getElementById('pokemonSelect').value = '';
  document.getElementById('matchScope').value = 'all';
  syncMinSharedOptions();
  document.getElementById('summary').className = 'empty';
  document.getElementById('summary').textContent = 'Choose a starting Pokemon, then run the search to find the best habitat matches.';
  document.getElementById('liveFilters').hidden = true;
  document.getElementById('liveFilters').innerHTML = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('resultsCount').textContent = 'No search yet.';
}

function searchCompatibility() {
  const selectedName = document.getElementById('pokemonSelect').value;
  const minShared = Number(document.getElementById('minShared').value);
  const scope = document.getElementById('matchScope').value;
  const results = document.getElementById('results');
  const resultsCount = document.getElementById('resultsCount');
  const summary = document.getElementById('summary');

  if (!selectedName) {
    summary.className = 'empty';
    summary.textContent = 'Select your starting Pokemon first.';
    latestSearchState = null;
    activeResultFavoriteFilters = [];
    activeResultFlavorFilter = false;
    document.getElementById('liveFilters').hidden = true;
    results.innerHTML = '';
    resultsCount.textContent = 'No search yet.';
    return;
  }

  const base = DATA.find((pokemon) => pokemon.name === selectedName);
  if (!base) {
    summary.className = 'empty';
    summary.textContent = 'That Pokemon was not found in the dataset.';
    latestSearchState = null;
    activeResultFavoriteFilters = [];
    activeResultFlavorFilter = false;
    document.getElementById('liveFilters').hidden = true;
    results.innerHTML = '';
    resultsCount.textContent = 'No search yet.';
    return;
  }

  const baseProfile = getPokemonProfile(base);
  const filteredPool = getFilteredPokemon();
  const pool = scope === 'filtered' ? filteredPool : DATA;
  const matches = pool
    .filter((pokemon) => pokemon.name !== base.name)
    .map((pokemon) => {
      const profile = getPokemonProfile(pokemon);
      const sharedFavorites = intersect(baseProfile.interests, profile.interests);
      return {
        other: profile,
        sharedFavorites
      };
    })
    .filter((item) => item.sharedFavorites.length >= minShared)
    .sort((a, b) => {
      if (b.sharedFavorites.length !== a.sharedFavorites.length) {
        return b.sharedFavorites.length - a.sharedFavorites.length;
      }
      return a.other.name.localeCompare(b.other.name);
    });

  renderSummary(baseProfile);
  latestSearchState = {
    base: baseProfile,
    matches
  };
  activeResultFavoriteFilters = [];
  activeResultFlavorFilter = false;
  renderLiveFilters(baseProfile);

  if (matches.length === 0) {
    document.getElementById('liveFilters').hidden = true;
    resultsCount.textContent = '0 ranked habitat matches.';
    results.innerHTML = '<div class="empty">No Pokemon reached the selected compatibility threshold for this starting Pokemon.</div>';
    return;
  }
  renderResultsFromState();
}

function enableUi() {
  document.getElementById('pokemonSelect').disabled = false;
  document.getElementById('matchScope').disabled = false;
  syncMinSharedOptions();
}

async function loadData() {
  const status = document.getElementById('loadStatus');

  try {
    const response = await fetch('./dex.json');
    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }

    const rawData = await response.json();
    DATA = rawData
      .filter((item) => item && item.name && Array.isArray(item.specialties) && Array.isArray(item.favorites))
      .sort((a, b) => a.name.localeCompare(b.name));

    renderSpecialties();
    setupSpecialtyAutocomplete();
    renderPokemonSelect();
    updateFilterCount();
    enableUi();

    document.getElementById('matchScope').value = 'all';
    status.textContent = 'Loaded ' + DATA.length + ' Pokemon';
  } catch (error) {
    status.innerHTML = 'Could not load Pokemon.';
    document.getElementById('summary').className = 'empty';
    document.getElementById('summary').textContent = 'Data loading failed, so matches are unavailable.';
  }
}

document.getElementById('searchBtn').addEventListener('click', searchCompatibility);
document.getElementById('pokemonSelect').addEventListener('change', () => {
  syncMinSharedOptions();
  document.getElementById('resultsCount').textContent = 'Ready to search.';
});
document.getElementById('matchScope').addEventListener('change', () => {
  syncMinSharedOptions();
});

loadData();
</script>
